{% extends "base.html" %}

{% block content %}
<div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem;">
    <div>
        <h1 style="font-size: 2.25rem; margin-bottom: 0.5rem;">Change Password</h1>
        <p style="color: var(--text-muted); font-size: 1.125rem;">Update your account's security credentials.</p>
    </div>
</div>

<div class="form-container">
    <div style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem;">
        <h3 style="margin: 0 0 0.5rem; display: flex; align-items: center; gap: 0.75rem; font-size: 1.5rem; color: var(--text-main); font-weight: 700;">
            <i data-lucide="key-round" style="width: 24px; height: 24px; color: var(--primary);"></i> Security Settings
        </h3>
        <p style="color: var(--text-muted); font-size: 0.875rem; margin: 0;">Ensure your new password meets the security requirements.</p>
    </div>

    <form id="teacherPasswordForm" onsubmit="event.preventDefault(); submitTeacherPassword();">
        <div class="form-grid" style="margin-bottom: 1.5rem;">
            <div class="form-group" style="grid-column: 1 / -1; max-width: 500px;">
                <label class="form-label">Current Password <span style="color: #ef4444;">*</span></label>
                <div class="form-input-wrapper">
                    <i data-lucide="lock" class="form-input-icon"></i>
                    <input type="password" name="current_password" required class="form-input form-input-with-icon" placeholder="Enter current password">
                </div>
            </div>

            <div class="form-group" style="grid-column: 1 / -1; max-width: 500px; margin-top: 1rem;">
                <label class="form-label">New Password <span style="color: #ef4444;">*</span></label>
                <div class="form-input-wrapper">
                    <i data-lucide="key-round" class="form-input-icon"></i>
                    <input type="password" name="new_password" required minlength="8" class="form-input form-input-with-icon" placeholder="Minimum 8 characters (letters & numbers)">
                </div>
                <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="info" style="width: 14px; height: 14px;"></i>
                    Must contain at least one letter and one number.
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-start; border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem; max-width: 500px;">
            <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2.5rem; font-size: 0.9375rem; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; box-shadow: var(--shadow-sm);">
                <i data-lucide="save" style="width: 18px; height: 18px;"></i> Update Password
            </button>
        </div>
    </form>
</div>

<style>
/* Form UI Redesign Styles (matching admin modules) */
.form-container {
    width: 100%;
    margin-bottom: 2.5rem;
    padding: 2rem;
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    transition: var(--transition);
}

.form-container:hover {
    box-shadow: var(--shadow-md);
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    margin-bottom: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.form-label {
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: 0.02em;
}

.form-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.form-input-icon {
    position: absolute;
    left: 1rem;
    color: var(--text-muted);
    width: 18px;
    height: 18px;
    pointer-events: none;
    z-index: 10;
}

.form-input-with-icon {
    padding-left: 2.75rem !important;
}

.form-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 0.9375rem;
    color: var(--text-main);
    background: #f8fafc;
    transition: all 0.2s ease;
    font-family: inherit;
    box-sizing: border-box;
}

.form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    background: white;
}
</style>

<script>
function submitTeacherPassword() {
    const form = document.getElementById('teacherPasswordForm');
    const formData = new FormData(form);
    
    fetch("{{ url_for('teacher_change_password') }}", {
        method: "POST",
        body: formData,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(r => r.json())
    .then(data => {
        if(data.success) {
            if (typeof showToast !== 'undefined') {
                showToast(data.msg, 'success');
            } else {
                alert(data.msg);
            }
            form.reset();
        } else {
            if (typeof showToast !== 'undefined') {
                showToast(data.error, 'error');
            } else {
                alert(data.error);
            }
        }
    })
    .catch(err => {
        if (typeof showToast !== 'undefined') {
            showToast('A network error occurred.', 'error');
        } else {
            alert('A network error occurred.');
        }
    });
}
</script>
{% endblock %}
